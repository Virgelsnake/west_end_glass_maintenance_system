server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Disable directory listing (prevents 403 on unknown paths)
    autoindex off;

    # SPA fallback — serve index.html for all routes so React Router works.
    # Do NOT include $uri/ (directory check): with autoindex off nginx returns
    # 403 if a directory happens to match, which breaks deep-link/refresh.
    location / {
        try_files $uri /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
}
