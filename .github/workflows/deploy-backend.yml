name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend_api/**'
      - '.github/workflows/deploy-backend.yml'

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: 150314557466.dkr.ecr.us-west-2.amazonaws.com
  ECR_REPOSITORY: west-end-glass-api
  DEPLOY_DIR: /home/phocus/west_end_glass_maintenance_system

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build and push image
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} ./backend_api
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

      - name: Write docker-compose.yml to deploy dir
        run: |
          cp deploy/docker-compose.prod.yml ${{ env.DEPLOY_DIR }}/docker-compose.yml

      - name: Pull new image and restart
        run: |
          cd ${{ env.DEPLOY_DIR }}
          docker compose pull fastapi-app
          docker compose up -d fastapi-app

      - name: Clean up old images
        run: docker image prune -f
