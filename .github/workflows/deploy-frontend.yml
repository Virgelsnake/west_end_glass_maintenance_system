name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'backend_admin_page/**'
      - '.github/workflows/deploy-frontend.yml'

env:
  S3_BUCKET: digitalbullet.net
  S3_PREFIX: customertest/westend
  CLOUDFRONT_DISTRIBUTION_ID: E2YHR4BATSOENS
  AWS_REGION: us-west-2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend_admin_page/package-lock.json

      - name: Install dependencies
        working-directory: backend_admin_page
        run: npm ci

      - name: Build
        working-directory: backend_admin_page
        env:
          VITE_API_BASE_URL: https://api.westend.customertest.digitalbullet.net
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync backend_admin_page/dist/ \
            s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp backend_admin_page/dist/index.html \
            s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/${{ env.S3_PREFIX }}/*"
